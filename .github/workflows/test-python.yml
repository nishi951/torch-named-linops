name: Install, Lint, and Test

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+' # Triggers on semantic version tags like 1.0.0, 2.1.5, etc.
      - '[0-9]+.[0-9]+.[0-9]+-*' # Can also include pre-release tags like 1.0.0-rc1


concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  python-install-lint-test:
    name: ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os  }}
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    strategy:
      max-parallel: 5
      matrix:
        os: [ubuntu-latest]
        # deps: ['dev'] # 'test-cuda11' coming soon? https://github.com/github/roadmap/issues/961
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up python with uv
        uses: astral-sh/setup-uv@v8

      - name: Install python
        run: uv python install ${{ matrix.python-version }}

      - name: Initialize environment
        run: uv sync --group all

      - name: Lint with ruff
        run: uv run ruff check

      - name: Run tests with coverage
        run: uv run pytest --cov=src --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
