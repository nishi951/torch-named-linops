[project]
site_name = "Torch Named Linops"
site_url = "https://nishi951.github.io/torch-named-linops/"
site_description = "A flexible linear operator abstraction in pytorch."
site_dir = "_site"
docs_dir = "docs"
copyright = "Copyright &copy; 2026 Mark Nishimura"

repo_url = "https://github.com/nishi951/torch-named-linops"
repo_name = "torch-named-linops"

edit_uri = "edit/main/docs/"

extra_css = [
    "assets/css/logo.css",
    "assets/css/dark_mode_shell_output.css",
    "assets/css/extras.css",
]

extra_javascript = [
    "javascripts/mathjax.js",
    "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js",
]

[project.theme]
variant = "classic"
logo = "assets/logo_dark.svg"
favicon = "assets/favicon.svg"
features = [
    "navigation.indexes",
    "navigation.sections",
    "navigation.tabs",
    "navigation.top",
    "search.highlight",
    "content.code.copy",
]

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "indigo"
toggle.icon = "material/weather-night"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "indigo"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to light mode"

[project.theme.icon]
repo = "fontawesome/brands/github"

# Navigation structure
[[project.nav]]
"Getting Started" = [
    "getting_started/index.md",
    "getting_started/installation.md",
]

[[project.nav]]
"Tutorials" = "tutorials/"

[[project.nav]]
"How-To Guides" = [
    "howto/index.md",
    { "Custom Linops" = "howto/custom_linops.md" },
]

[[project.nav]]
"Explanations" = [
    "explanations/index.md",
    { "Named Abstractions" = "explanations/named_abstractions.md" },
    { "Why This Package?" = "explanations/why_this_package.md" },
    { "Design Notes" = "explanations/design_notes.md" },
    { "Copying Linops" = "explanations/copying_linops.md" },
    { "Multi-GPU Splitting" = "explanations/multi_gpu.md" },
    { "FAQ" = "explanations/faq.md" },
]

[[project.nav]]
"API Reference" = [
    "reference/index.md",
    { "Linops" = [
        "reference/linops/index.md",
        { "NamedLinop" = "reference/linops/namedlinop.md" },
        { "Add" = "reference/linops/add.md" },
        { "ArrayToBlocks/BlocksToArray" = "reference/linops/array_manipulation.md" },
        { "Chain" = "reference/linops/chain.md" },
        { "Concat & Stack" = "reference/linops/concat_stack.md" },
        { "Dense" = "reference/linops/dense.md" },
        { "Device Transfer" = "reference/linops/device.md" },
        { "Diagonal & Scalar" = "reference/linops/diagonal.md" },
        { "Einops" = "reference/linops/einops.md" },
        { "FFT" = "reference/linops/fft.md" },
        { "Identity" = "reference/linops/identity.md" },
        { "Interpolation" = "reference/linops/interp.md" },
        { "NUFFT" = "reference/linops/nufft.md" },
        { "Padding & Truncation" = "reference/linops/pad.md" },
        { "Sampling" = "reference/linops/sampling.md" },
        { "Splitting" = "reference/linops/split.md" },
        { "Threadable" = "reference/linops/threadable.md" },
    ] },
    { "Functional" = [
        "reference/functional/index.md",
        { "Interpolation" = "reference/functional/interp.md" },
        { "Indexing" = "reference/functional/index.md" },
        { "NUFFT" = "reference/functional/nufft.md" },
        { "Padding" = "reference/functional/pad.md" },
        { "Unfold/Fold" = "reference/functional/unfold.md" },
    ] },
    { "NamedDim" = [
        "reference/nameddim/nameddimension.md",
        "reference/nameddim/namedshape.md",
        "reference/nameddim/matching.md",
    ] },
    { "Algorithms" = [
        "reference/alg/cg.md",
        "reference/alg/poly.md",
        "reference/alg/powermethod.md",
    ] },
    { "Utils" = [
        "reference/utils/math.md",
        "reference/utils/memory.md",
        "reference/utils/benchmark.md",
    ] },
]

# mkdocstrings configuration
[project.plugins.mkdocstrings.handlers.python]
paths = ["src/torchlinops"]
inventories = [
    "https://docs.python.org/3/objects.inv",
    "https://pytorch.org/docs/stable/objects.inv",
]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "numpy"
docstring_section_style = "spacy"
show_source = true
show_root_heading = true
show_signature = true
show_signature_annotations = true
separate_signature = true
show_symbol_type_heading = true
show_symbol_type_toc = true

# Markdown extensions
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]
